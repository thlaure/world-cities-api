services:
  app:
    build:
      context: .
      dockerfile: docker/frankenphp/Dockerfile.dev
    container_name: insee-city-api-app
    restart: unless-stopped
    # Dev-only ports/bind-mounts (source code, xdebug, dev php.ini/Caddyfile) live in
    # docker-compose.override.yml, auto-merged by plain `docker compose` commands so
    # `make up`/CI behavior is unchanged. Production layers docker-compose.prod.yml
    # instead (explicit -f, so the override file is not picked up).
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    # No mem_limit here — dev-time CLI tooling (Rector, PHPStan, PHPUnit) runs inside
    # this same container via `docker compose exec app ...` and needs headroom beyond
    # what the FrankenPHP server itself uses. docker-compose.prod.yml sets a limit
    # sized for serving traffic only, since prod never runs that tooling.
    environment:
      - APP_ENV=${APP_ENV:-dev}
      - APP_DEBUG=${APP_DEBUG:-1}
      - APP_SECRET=${APP_SECRET:-changeme}
      - DATABASE_URL=postgresql://insee:insee@database:5432/insee_city?serverVersion=16&charset=utf8
      - DATABASE_URL_TEST=postgresql://insee:insee@database:5432/insee_city_test?serverVersion=16&charset=utf8
      - FRANKENPHP_CONFIG=worker ./public/index.php
      - SERVER_NAME=:80
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - insee-city-api

  database:
    image: postgres:16-alpine
    container_name: insee-city-api-postgres
    restart: unless-stopped
    # No host port publish here by design — only `app` needs to reach this, over the
    # internal network. docker-compose.override.yml re-adds 5433:5432 for local dev
    # tools (psql from the host); production never gets that back.
    environment:
      POSTGRES_USER: insee
      POSTGRES_PASSWORD: insee
      POSTGRES_DB: insee_city
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insee -d insee_city"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    networks:
      - insee-city-api

  photon:
    build:
      context: .
      dockerfile: docker/photon/Dockerfile
    container_name: insee-city-api-photon
    restart: unless-stopped
    # No host port publish here by design — Photon has no auth of its own, and only
    # `app` needs to reach it, over the internal network. docker-compose.override.yml
    # re-adds 2322:2322 for local debugging; production never gets that back.
    volumes:
      - photon_data:/photon/photon_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2322/api?q=paris&limit=1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 15m
    mem_limit: 2g
    networks:
      - insee-city-api

networks:
  insee-city-api:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  photon_data:
