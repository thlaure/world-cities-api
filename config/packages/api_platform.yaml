api_platform:
    title: 'World Cities API'
    description: 'Symfony/API Platform API exposing city data for any country (ISO 3166-1 alpha-2) and address search'
    version: '1.0.0'

    enable_swagger_ui: true
    enable_re_doc: false
    enable_docs: true

    formats:
        jsonld: ['application/ld+json']
        json: ['application/json']

    error_formats:
        jsonproblem: ['application/problem+json']
        jsonld: ['application/ld+json']
        json: ['application/json']

    docs_formats:
        jsonld: ['application/ld+json']
        jsonopenapi: ['application/vnd.openapi+json']
        html: ['text/html']

    swagger:
        versions: [3]

    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Origin']
        extra_properties:
            standard_put: true
            rfc_7807_compliant_errors: true

    collection:
        pagination:
            enabled: true

    mapping:
        paths:
            - '%kernel.project_dir%/src/UI/ApiResource'

when@dev:
    api_platform:
        defaults:
            cache_headers:
                max_age: 0
                shared_max_age: 0
                public: false
                no_store: true

when@prod:
    api_platform:
        enable_swagger_ui: false
        enable_docs: false
        defaults:
            cache_headers:
                max_age: 3600
                shared_max_age: 3600
                public: true
