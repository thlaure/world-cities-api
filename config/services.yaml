# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Domain\City\Port\CityRepositoryInterface:
        alias: App\Infrastructure\Persistence\DoctrineCityRepository

    App\Infrastructure\External\GeoApiClient:
        arguments:
            $baseUrl: '%env(INSEE_API_BASE_URL)%'
        tags: [!php/const App\Domain\City\Port\CityDataProviderInterface::TAG]

    # GeoNamesClient is reusable across any GeoNames-covered country (download.geonames.org) —
    # only $countryCode differs between instances. Adding another country's cities via
    # GeoNames means adding one more tagged instance below, not a new PHP class.
    App\Infrastructure\External\GeoNamesClient:
        abstract: true
        arguments:
            $baseUrl: '%env(GEONAMES_BASE_URL)%'

    App\Infrastructure\External\GeoNamesClient.DE:
        parent: App\Infrastructure\External\GeoNamesClient
        arguments:
            $countryCode: !php/enum App\Domain\Shared\Model\CountryCode::DE
        tags: [!php/const App\Domain\City\Port\CityDataProviderInterface::TAG]

    # If you rename CityDataProviderInterface::TAG, update this literal too —
    # !tagged_iterator can't reference a PHP constant directly.
    App\Application\City\Handler\ImportCitiesHandler:
        arguments:
            $dataProviders: !tagged_iterator app.city_data_provider

    App\Domain\Address\Port\AddressProviderInterface:
        alias: App\Infrastructure\External\PhotonClient

    App\Infrastructure\External\PhotonClient:
        arguments:
            $baseUrl: '%env(PHOTON_BASE_URL)%'
